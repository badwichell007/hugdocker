[tui]
refresh_ms = 2000
log_tail = 200
default_filter = ""
# options: cockpit, industrial, signal, ocean
theme = "cockpit"

[safety]
typed_confirmation = true
allow_yes_for_purge = false

[group_exact]
"mcphub" = "devtools"

[group_prefix]
"redis-" = "cache"
"postgres-" = "database"

[group_image_prefix]
"redis:" = "cache"
"postgres:" = "database"

[profiles.groups]
"frontend" = ["web*", "nginx*"]
"data" = ["postgres*", "redis*", "mysql*"]
"ops" = ["grafana*", "prometheus*", "loki*"]
